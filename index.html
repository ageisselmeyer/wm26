<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="description" content="WM 2026 Spiele heute in MESZ mit Ergebnissen und TV-Sendern.">
  <meta name="application-name" content="WM 2026">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WM 2026">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>WM 2026</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <div id="app">
  <header>
    <h1><img class="title-icon" src="icon.svg" alt="" width="36" height="36" decoding="async"> WM 2026</h1>
  </header>

  <main class="app-scroll">
  <div class="container">
    <div class="card">
      <h2 id="heading">📅 Heute</h2>
      <div id="games"></div>
    </div>
  </div>
  </main>

  <nav class="day-nav" aria-label="Tag wählen">
    <button type="button" id="day-prev" class="day-nav-btn" aria-label="Vorheriger Tag">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14.5 5.5 8 12l6.5 6.5 1.4-1.4L10.8 12l4.9-5.1z"/></svg>
    </button>
    <button type="button" id="day-today" class="day-nav-btn day-nav-today" aria-label="Heute">Heute</button>
    <button type="button" id="day-next" class="day-nav-btn" aria-label="Nächster Tag">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m9.5 5.5 6.5 6.5-6.5 6.5-1.4-1.4 5.1-5.1-5.1-5z"/></svg>
    </button>
  </nav>
  </div>

  <script src="logos.js?v=6"></script>
  <script src="anstosszeiten.js?v=2"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
